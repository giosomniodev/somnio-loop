name: Deploy docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: cd docs && pnpm install --frozen-lockfile

      - name: Lint
        run: cd docs && pnpm lint

      - name: Build
        run: cd docs && pnpm build

      - name: Serve and link check
        run: |
          mkdir -p /tmp/serve-docs/somnio-loop
          cp -r docs/out/. /tmp/serve-docs/somnio-loop/
          npx serve /tmp/serve-docs -l 4000 &
          sleep 3
          npx linkinator http://localhost:4000/somnio-loop/ --recurse \
            --skip "^https?://(github\.com|twitter\.com|x\.com|www\.)" \
            --verbosity error

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/out
